name: check

on:
  push:
    branches: [main]
  pull_request:
    branches: ["*"]
    types: [synchronize, opened, reopened, edited]
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - "ubuntu-latest"
          - "macos-latest"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - run: |
          bazel test //...

  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - "rustfmt"
          - "clippy"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          bazel build \
            --keep_going \
            --config=${{ matrix.config }} \
            //...

  buildifier:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          bazel run //tools/format:buildifier.check

  # https://emmer.dev/blog/skippable-github-status-checks-aren-t-really-required/
  # https://github.com/marketplace/actions/alls-green
  all:
    runs-on: ubuntu-latest
    if: always()
    needs:
      - build
      - buildifier
      - test
    steps:
      - uses: Kesin11/actions-timeline@v2
      - uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
